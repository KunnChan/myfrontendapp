name: Build and Deploy Vite App to S3

on:
  push:
    branches: [dev] # Only triggers on actual push to dev
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "21"

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Set PR bucket, configure static website, and deploy to S3
        run: |
          BUCKET_NAME=myapp-pr-${{ github.event.pull_request.number }}-preview
          echo "PREVIEW_BUCKET=$BUCKET_NAME" >> $GITHUB_ENV

          # Create bucket if not exists
          aws s3api create-bucket \
            --bucket $BUCKET_NAME \
            --region ap-southeast-1 \
            --create-bucket-configuration LocationConstraint=ap-southeast-1 || true

          # Enable static website hosting
          aws s3 website s3://$BUCKET_NAME/ --index-document index.html --error-document index.html

          # Set bucket policy for public read
          cat <<EOF > bucket-policy.json
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::$BUCKET_NAME/*"
              }
            ]
          }
          EOF

          aws s3api put-bucket-policy --bucket $BUCKET_NAME --policy file://bucket-policy.json

          # Sync build output
          aws s3 sync ./dist/ s3://$BUCKET_NAME --delete

      - name: Comment Preview URL
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Preview ready: https://${process.env.PREVIEW_BUCKET}.s3-website-${process.env.AWS_REGION}.amazonaws.com`
            })
        env:
          AWS_REGION: ap-southeast-1
          PREVIEW_BUCKET: ${{ env.PREVIEW_BUCKET }}

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Delete PR Preview Bucket
        run: |
          BUCKET_NAME=myapp-pr-${{ github.event.pull_request.number }}-preview

          echo "Deleting bucket: $BUCKET_NAME"

          # Remove all files first
          aws s3 rm s3://$BUCKET_NAME --recursive || true

          # Then delete bucket
          aws s3api delete-bucket --bucket $BUCKET_NAME --region ap-southeast-1 || true
        env:
          AWS_REGION: ap-southeast-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "21"

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

      - name: Deploy to Dev Bucket
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: www.thedevbranch.com
          AWS_REGION: ap-southeast-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: dist
